<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>
    <link rel="stylesheet" href="estilos/style.css">
    <link rel="stylesheet" href="estilos/mediaquery.css">
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formulario">
                <h1>Login</h1>
                <p>Seja bem-vindo! Faça login para acessar sua conta e poder fazer suas configurações no seu ambiente.</p>
                <form action="login.php" method="post">
                    <input type="text" name="username" id="iusername" placeholder="Usuário" minlength="6" maxlength="12" required>
                    <input type="password" name="password" id="ipassword" placeholder="Senha" minlength="8" maxlength="16" required>
                    <input type="submit" value="Entrar">
                    <input type="button" value="Esqueci minha senha">
                </form>
            </div>
        </section>
    </main>
    
</body>
</html>
